<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-xl shadow w-full max-w-lg">

    <h2 class="text-2xl font-bold mb-6 text-gray-800">
        Crear nuevo post
    </h2>

    <div th:if="${param.error}"
         class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-center">
        La imagen no pudo publicarse porque no superó el control de contenido.
        Intenta con otra imagen.
    </div>

    <form action="/post/create" method="post" class="space-y-4">


        <input type="hidden" name="blogId" th:value="${blogId}">

        <!-- TÍTULO -->
        <input type="text" name="title"
               placeholder="Título"
               class="w-full border p-3 rounded-lg"
               required>

        <!-- CONTENIDO -->
        <textarea name="content"
                  placeholder="Contenido"
                  class="w-full border p-3 rounded-lg"
                  required></textarea>

        <!-- IMAGEN (URL) -->
        <input type="text" name="imageUrl"
               placeholder="URL de imagen (opcional)"
               class="w-full border p-3 rounded-lg">


        <input type="text" name="imageCaption"
               placeholder="Descripción de la imagen (opcional)"
               class="w-full border p-3 rounded-lg">

        <!-- BOTÓN -->
        <button type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600">
            Publicar
        </button>

    </form>

</div>

</body>
</html>
