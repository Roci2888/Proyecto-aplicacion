<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-indigo-600 min-h-screen">

<!-- FORMULARIO CENTRADO -->
<div class="flex items-center justify-center min-h-screen">

    <div class="bg-white/95 backdrop-blur-sm p-10 rounded-2xl shadow-xl w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Iniciar sesión
        </h2>

        <!-- MENSAJE éxito -->
        <p th:if="${param.success}" class="text-green-500 text-sm text-center mb-4">
            Registro exitoso, ahora inicia sesión
        </p>

        <!-- MENSAJE ERROR (desde URL) -->
        <p th:if="${param.error}" class="text-red-500 text-sm text-center mb-4">
            Usuario o contraseña incorrectos
        </p>

        <!-- MENSAJE ERROR (desde servidor) -->
        <p th:if="${error}" class="text-red-500 text-sm text-center mb-4" th:text="${error}">
        </p>

        <form action="/auth/login" method="post" class="space-y-4">

            <div>
                <label class="block text-gray-600 mb-1">Usuario</label>
                <input type="text" name="username"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                       required>
            </div>

            <div>
                <label class="block text-gray-600 mb-1">Contraseña</label>
                <input type="password" name="password"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                       required>
            </div>

            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Ingresar
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-4">
            ¿No tienes cuenta?
            <a href="/register" class="text-blue-500 hover:underline">Regístrate</a>
        </p>

        <!-- Enlaces adicionales opcionales -->
        <div class="mt-4 text-center text-xs text-gray-400">
            <a href="/" class="hover:underline">Volver al inicio</a>
        </div>

    </div>
</div>

</body>
</html>
