<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Galería de Imágenes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-subir {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            transition: transform 0.3s;
        }

        .btn-subir:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .post-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-imagen {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .post-contenido {
            padding: 20px;
        }

        .post-titulo {
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }

        .post-texto {
            color: #555;
            line-height: 1.6;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .mensaje {
            background: #27ae60;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error {
            background: #e74c3c;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📸 Galería Verde Azul</h1>
        <p>Comparte tus imágenes con una historia</p>
        <a href="/subir" class="btn-subir">+ Subir nueva imagen</a>
    </div>

    <div th:if="${mensaje}" class="mensaje" th:text="${mensaje}"></div>
    <div th:if="${error}" class="mensaje error" th:text="${error}"></div>

    <div class="galeria" th:if="${!posts.isEmpty()}">
        <div th:each="post : ${posts}" class="post-card">
            <img th:src="@{/uploads/{nombre}(nombre=${post.nombreImagen})}"
                 class="post-imagen"
                 th:alt="${post.titulo}">
            <div class="post-contenido">
                <h3 class="post-titulo" th:text="${post.titulo}">Título</h3>
                <div class="post-texto" th:text="${post.texto}">Texto</div>
            </div>
        </div>
    </div>

    <div th:if="${posts.isEmpty()}" class="empty-state">
        <h2>No hay publicaciones aún</h2>
        <p>¡Sé el primero en subir una imagen!</p>
    </div>
</div>
</body>
</html>
